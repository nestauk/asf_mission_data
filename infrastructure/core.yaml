AWSTemplateFormatVersion: '2010-09-09'
Description: >
  ASF Mission Data - Core infrastructure for ECS Fargate pipelines.
  Includes ECS cluster, task definition, IAM roles, security group,
  CloudWatch log group.

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
    Description: Environment name. Used to namespace all resources.

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy the security group into.

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnets for Fargate tasks (need internet access).

  TaskCpu:
    Type: Number
    Default: 256
    AllowedValues: [256, 512, 1024, 2048, 4096]
    Description: CPU units for Fargate tasks (256 = 0.25 vCPU).

  TaskMemory:
    Type: Number
    Default: 512
    AllowedValues: [512, 1024, 2048, 3072, 4096, 5120, 6144, 7168, 8192]
    Description: Memory in MB for Fargate tasks.

  LogRetentionDays:
    Type: Number
    Default: 30
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365]
    Description: CloudWatch log retention in days.

Conditions:
  IsProd: !Equals [!Ref EnvironmentName, prod]

Resources:

  # ---------- Networking ----------
  # No inbound rules: our tasks only make outbound HTTP requests
  # (scraping gov websites, writing to S3). Inbound is blocked by default.
  TaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "Security group for ASF pipeline tasks (${EnvironmentName})"
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub "asf-mission-data-${EnvironmentName}-tasks"
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: asf-policy-dashboard
        - Key: ManagedBy
          Value: cloudformation
        - Key: Team
          Value: asf

  # ---------- Logging ----------

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/asf-mission-data-${EnvironmentName}"
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: asf-policy-dashboard
        - Key: ManagedBy
          Value: cloudformation
        - Key: Team
          Value: asf

  # ---------- IAM ----------
# The execution role is assumed by the ECS agent before the pipeline code runs (it needs to pull the image from ECR and set up logging)
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "asf-mission-data-${EnvironmentName}-task-execution-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
            # AWS managed policy gives ECR pull + CloudWatch Logs write
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: asf-policy-dashboard
        - Key: ManagedBy
          Value: cloudformation
        - Key: Team
          Value: asf

# The task role is assumed by the container itself once it's running. What the pipeline code uses when it calls boto3 to read/write S3
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "asf-mission-data-${EnvironmentName}-task-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3DataAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Read write and delete objects (bronze/silver data + heartbeats)
              # Delete is for the overwrite latest pattern where we
              # list and delete before writing new files
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                - !Sub "arn:aws:s3:::asf-mission-data-${EnvironmentName}/*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Sub "arn:aws:s3:::asf-mission-data-${EnvironmentName}"
                # ListBucket is a bucket-level permission (not object-level),
                # so it would be unhappy in the above group with the bucket and objects. Needs to be separate.
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: asf-policy-dashboard
        - Key: ManagedBy
          Value: cloudformation
        - Key: Team
          Value: asf

# EventBridge needs its own role to call ecs:RunTask and to pass the other roles to the task it's creating
  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "asf-mission-data-${EnvironmentName}-scheduler-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RunEcsTasks
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ecs:RunTask
                Resource: !Sub "arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:task-definition/asf-mission-data-${EnvironmentName}:*"
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt TaskExecutionRole.Arn
                  - !GetAtt TaskRole.Arn
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: asf-policy-dashboard
        - Key: ManagedBy
          Value: cloudformation
        - Key: Team
          Value: asf

  # ---------- Compute ----------
  # One cluster for the whole project. All pipelines run here.
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "asf-mission-data-${EnvironmentName}"
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      # Use standard Fargate for both environments for predictable launches.
      # We can reintroduce Spot later once the pipeline path is stable enough
      # that occasional capacity failures are an acceptable tradeoff.
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
      ClusterSettings:
        - Name: containerInsights
          Value: disabled
      # Container Insights = detailed CPU/memory monitoring. Costs extra.
      # Not worth it for batch tasks that run for 2 seconds.
      # Decided that CloudWatch Logs is enough.
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: asf-policy-dashboard
        - Key: ManagedBy
          Value: cloudformation
        - Key: Team
          Value: asf

  # One shared task definition. The container image contains all pipelines
  # Which pipeline runs is controlled by command override
  # passed at runtime (e.g. ["energy_price_cap", "--stage", "all"])
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "asf-mission-data-${EnvironmentName}"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      RuntimePlatform:
        # Must match with the --platform flag in the Docker build workflow
        OperatingSystemFamily: LINUX
        CpuArchitecture: X86_64
      ContainerDefinitions:
        - Name: app
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/asf-mission-data:${EnvironmentName}-latest"
          Essential: true
          Environment:
            - Name: DATA_MODE
              Value: !If [IsProd, PROD, DEV]
            - Name: DATA_ROOT
              Value: !Sub "s3://asf-mission-data-${EnvironmentName}"
            - Name: ASF_ENVIRONMENT
              Value: !Ref EnvironmentName
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref "AWS::Region"
              # Each task run gets a unique stream e.g. "pipeline/<task-id>"
              awslogs-stream-prefix: pipeline
      Tags:
        - Key: Environment
          Value: !Ref EnvironmentName
        - Key: Project
          Value: asf-policy-dashboard
        - Key: ManagedBy
          Value: cloudformation
        - Key: Team
          Value: asf

Outputs:
  ClusterArn:
    Description: ARN of the ECS cluster
    Value: !GetAtt ECSCluster.Arn
    Export:
      Name: !Sub "asf-${EnvironmentName}-cluster-arn"

  TaskDefinitionArn:
    Description: ARN of the task definition
    Value: !Ref TaskDefinition
    Export:
      Name: !Sub "asf-${EnvironmentName}-task-definition-arn"

  TaskExecutionRoleArn:
    Description: ARN of the task execution role
    Value: !GetAtt TaskExecutionRole.Arn
    Export:
      Name: !Sub "asf-${EnvironmentName}-task-execution-role-arn"

  TaskRoleArn:
    Description: ARN of the task role
    Value: !GetAtt TaskRole.Arn
    Export:
      Name: !Sub "asf-${EnvironmentName}-task-role-arn"

  SchedulerRoleArn:
    Description: ARN of the EventBridge scheduler role
    Value: !GetAtt SchedulerRole.Arn
    Export:
      Name: !Sub "asf-${EnvironmentName}-scheduler-role-arn"

  SecurityGroupId:
    Description: Security group ID for Fargate tasks
    Value: !Ref TaskSecurityGroup
    Export:
      Name: !Sub "asf-${EnvironmentName}-security-group-id"

  SubnetIds:
    Description: Subnet IDs for Fargate tasks
    Value: !Join [",", !Ref SubnetIds]
    Export:
      Name: !Sub "asf-${EnvironmentName}-subnet-ids"
