name: Build and push Docker Image to ECR

on:
  workflow_dispatch:
  push:
    branches: [dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Run tests
        run: |
          uv sync --group dev
          uv run pytest

