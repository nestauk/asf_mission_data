name: run pytest
on:
  pull_request:
    branches: [dev]
jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Run tests
        run: |
          uv sync --group dev
          uv run pytest
